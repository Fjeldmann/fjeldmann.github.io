<div class="page-shell">
    <header class="page-header">
        <div class="container">
            {% if page.hero_image %}
            <div class="page-hero">
                <img src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" class="page-hero-image">
            </div>
            {% endif %}

            <h1>{{ page.title }}</h1>
            {% if page.description %}
            <p class="page-description">{{ page.description }}</p>
            {% endif %}
        </div>
    </header>

    {% if page.quicknav_links %}
    <div class="page-quicknav-wrap" data-quicknav-wrap>
        <div class="container">
            <nav class="page-quicknav" aria-label="Page navigation" data-quicknav-nav>
                {% for link in page.quicknav_links %}
                    <a href="#{{ link.href }}" data-quicknav-link>{{ link.label }}</a>
                {% endfor %}
            </nav>
        </div>
    </div>
    {% endif %}

    <section class="content-section page-content">
        <div class="container">
            {{ content }}
        </div>
    </section>
</div>
